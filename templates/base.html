<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}YouTube Refined{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f3f4f4",
                        "on-secondary-fixed-variant": "#5c5e6e",
                        "outline-variant": "#afb2b3",
                        "on-tertiary-fixed-variant": "#6f553b",
                        "on-primary": "#e5fff2",
                        "secondary-container": "#e6e6fa",
                        "on-primary-container": "#005a44",
                        "on-surface-variant": "#5c6060",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#525464",
                        "secondary-fixed-dim": "#d8d8ec",
                        "on-error": "#fff7f6",
                        "secondary": "#5c5e6e",
                        "on-tertiary-fixed": "#503921",
                        "surface-bright": "#f9f9f9",
                        "surface-variant": "#e0e3e4",
                        "primary-fixed-dim": "#7be2bd",
                        "primary": "#006c53",
                        "on-secondary-fixed": "#404251",
                        "tertiary-fixed": "#fed9b8",
                        "on-surface": "#2f3334",
                        "inverse-surface": "#0c0f0f",
                        "surface-tint": "#006c53",
                        "secondary-fixed": "#e6e6fa",
                        "on-error-container": "#65000b",
                        "on-primary-fixed-variant": "#00644c",
                        "error-container": "#f56965",
                        "on-background": "#2f3334",
                        "inverse-on-surface": "#9c9d9d",
                        "tertiary-dim": "#684e35",
                        "tertiary-fixed-dim": "#efcbab",
                        "surface": "#f9f9f9",
                        "secondary-dim": "#505262",
                        "surface-container-highest": "#e0e3e4",
                        "surface-container": "#edeeee",
                        "on-tertiary-container": "#644b32",
                        "on-tertiary": "#fff7f4",
                        "outline": "#777b7c",
                        "background": "#f9f9f9",
                        "on-secondary": "#faf8ff",
                        "error-dim": "#70030f",
                        "surface-container-high": "#e6e8e9",
                        "tertiary": "#755a40",
                        "inverse-primary": "#98ffd9",
                        "primary-container": "#89f0cb",
                        "surface-dim": "#d7dbdb",
                        "on-primary-fixed": "#004533",
                        "primary-fixed": "#89f0cb",
                        "error": "#ac3434",
                        "primary-dim": "#005f48",
                        "tertiary-container": "#fed9b8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e0e3e4;
            border-radius: 10px;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-surface text-on-surface">
    {% block content %}{% endblock %}
</body>
</html>
