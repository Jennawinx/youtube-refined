<div id="video-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/85 backdrop-blur-sm" role="dialog" aria-modal="true">
    <div class="relative w-full max-w-5xl mx-4">
      <div class="aspect-video w-full rounded-2xl overflow-hidden bg-black">
        <iframe id="video-modal-iframe" src="" allow="autoplay; fullscreen" allowfullscreen class="w-full h-full border-0"></iframe>
      </div>
      <div class="flex items-start justify-between gap-4 mt-3 px-1">
        <p id="video-modal-title" class="text-sm font-semibold text-white line-clamp-2"></p>
        <div class="flex items-center gap-2 flex-shrink-0">
          <a id="video-modal-link" href="#" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 rounded-lg border border-white/30 px-3 py-1.5 text-xs font-semibold text-white hover:bg-white/10 transition-colors">
            <span class="material-symbols-outlined text-[14px]">open_in_new</span>
            YouTube
          </a>
          <button id="video-modal-close" type="button" class="inline-flex items-center justify-center rounded-lg border border-white/30 p-1.5 text-white hover:bg-white/10 transition-colors">
            <span class="material-symbols-outlined text-[18px]">close</span>
          </button>
        </div>
      </div>
    </div>
</div>

<script>
  (function () {
    var modal    = document.getElementById('video-modal');
    var iframe   = document.getElementById('video-modal-iframe');
    var title    = document.getElementById('video-modal-title');
    var link     = document.getElementById('video-modal-link');
    var closeBtn = document.getElementById('video-modal-close');

    function openModal(videoId, videoTitle) {
      iframe.src = 'https://www.youtube.com/embed/' + videoId + '?enablejsapi=1';
      title.textContent = videoTitle;
      link.href = 'https://www.youtube.com/watch?v=' + videoId;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      iframe.src = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.video-card-thumb').forEach(function (btn) {
      btn.addEventListener('click', function () {
        openModal(btn.dataset.videoId, btn.dataset.videoTitle);
      });
    });

    closeBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  })();
</script>
