{% with group_name=name|default:'rating' max_value=max|default:5 %}
<div class="flex items-center gap-1" data-rate-range="{{ group_name }}">
    <input type="hidden" id="{{ group_name }}-min-input" name="{{ group_name }}_min" value="{{ selected_min|default:'' }}" />
    <input type="hidden" id="{{ group_name }}-max-input" name="{{ group_name }}_max" value="{{ selected_max|default:'' }}" />
    {% with ''|center:max_value as rating_range %}
        {% for _ in rating_range %}
            {% with option_value=forloop.counter %}
                <button
                    type="button"
                    data-value="{{ option_value }}"
                    class="inline-flex h-5 w-5 cursor-pointer select-none items-center justify-center rounded-full border border-outline-variant/60 bg-transparent text-[10px] font-semibold text-on-surface-variant/50 transition-colors"
                >{{ option_value }}</button>
            {% endwith %}
        {% endfor %}
    {% endwith %}
</div>
<script>
(function () {
    var CLS_DEFAULT = "inline-flex h-5 w-5 cursor-pointer select-none items-center justify-center rounded-full border border-outline-variant/60 bg-transparent text-[10px] font-semibold text-on-surface-variant/50 transition-colors";
    var CLS_BETWEEN = "inline-flex h-5 w-5 cursor-pointer select-none items-center justify-center rounded-full border border-primary/50 bg-primary/20 text-primary text-[10px] font-semibold transition-colors";
    var CLS_ENDPOINT = "inline-flex h-5 w-5 cursor-pointer select-none items-center justify-center rounded-full border border-primary bg-primary text-on-primary text-[10px] font-semibold transition-colors";

    function initRateRange(container) {
        if (container.dataset.rateRangeInit) return;
        container.dataset.rateRangeInit = "true";

        var groupName = container.dataset.rateRange;
        var minInput = document.getElementById(groupName + "-min-input");
        var maxInput = document.getElementById(groupName + "-max-input");
        var buttons = Array.from(container.querySelectorAll("button[data-value]"));

        var minVal = minInput.value !== "" ? parseInt(minInput.value, 10) : null;
        var maxVal = maxInput.value !== "" ? parseInt(maxInput.value, 10) : null;

        // Normalize persisted values into either a single point (min=max) or a valid range.
        if (minVal !== null && maxVal === null) {
            maxVal = minVal;
        } else if (maxVal !== null && minVal === null) {
            minVal = maxVal;
        } else if (minVal !== null && maxVal !== null && minVal > maxVal) {
            var temp = minVal;
            minVal = maxVal;
            maxVal = temp;
        }

        function updateVisuals() {
            buttons.forEach(function (btn) {
                var v = parseInt(btn.dataset.value, 10);
                var isEndpoint = v === minVal || v === maxVal;
                var isBetween = minVal !== null && maxVal !== null && v > minVal && v < maxVal;
                if (isEndpoint) {
                    btn.className = CLS_ENDPOINT;
                } else if (isBetween) {
                    btn.className = CLS_BETWEEN;
                } else {
                    btn.className = CLS_DEFAULT;
                }
            });
        }

        container.addEventListener("click", function (e) {
            var btn = e.target.closest("button[data-value]");
            if (!btn) return;
            var v = parseInt(btn.dataset.value, 10);

            if (minVal === null && maxVal === null) {
                // Nothing selected: start with a single-point range.
                minVal = v;
                maxVal = v;
            } else if (minVal === maxVal) {
                if (v === minVal) {
                    // Tap the same single-point value: clear selection.
                    minVal = null;
                    maxVal = null;
                } else {
                    // Expand from a point into a true range.
                    var lo = Math.min(v, minVal);
                    var hi = Math.max(v, minVal);
                    minVal = lo;
                    maxVal = hi;
                }
            } else {
                // Range already set: reset to a single-point range at clicked value.
                minVal = v;
                maxVal = v;
            }

            minInput.value = minVal !== null ? minVal : "";
            maxInput.value = maxVal !== null ? maxVal : "";
            updateVisuals();
        });

        updateVisuals();
    }

    document.querySelectorAll("[data-rate-range]").forEach(initRateRange);
})();
</script>
{% endwith %}
