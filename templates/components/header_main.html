<div>

        <a href="{{ back_url }}" class="text-sm font-semibold text-primary hover:underline">{{ back_label }}</a>
    {% endif %}
    <h1 class="text-3xl font-extrabold tracking-tight">{{ title }}</h1>
    {% if subtitle %}
        <p class="text-sm text-on-surface-variant mt-1">{{ subtitle }}</p>
    {% endif %}
</div>
