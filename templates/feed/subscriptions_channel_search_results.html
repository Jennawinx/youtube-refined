{% if results %}
    <ul class="flex flex-col divide-y divide-outline-variant/30">
        {% for channel in results %}
        <li>
            <button
                type="button"
                onclick="document.getElementById('channel_id').value='{{ channel.channel_id }}'; document.getElementById('channel-search-results').innerHTML=''; document.getElementById('channel-search-query').value='';"
                class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-surface-container-low transition-colors text-left"
            >
                {% if channel.thumbnail_url %}
                    <img src="{{ channel.thumbnail_url }}" alt="{{ channel.name }}" class="w-9 h-9 rounded-full object-cover flex-shrink-0" />
                {% else %}
                    <div class="w-9 h-9 rounded-full bg-surface-container-high flex items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-base text-on-surface-variant/50">person</span>
                    </div>
                {% endif %}
                <div class="flex flex-col min-w-0">
                    <span class="text-sm font-semibold text-on-surface truncate">{{ channel.name }}</span>
                    <span class="text-[11px] text-on-surface-variant/60 truncate font-mono">{{ channel.channel_id }}</span>
                </div>
            </button>
        </li>
        {% endfor %}
    </ul>
{% elif request.GET.q %}
    <p class="px-3 py-3 text-sm text-on-surface-variant/60">No channels found.</p>
{% endif %}
